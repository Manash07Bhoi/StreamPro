name: streampro
description: StreamPro - Premium Free Video Streaming Experience
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  animate_do: ^3.3.4
  bloc: ^8.1.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  device_info_plus: any
  dio: ^5.7.0
  equatable: ^2.0.8
  fluent_ui: ^4.13.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_inappwebview: ^6.1.0
  flutter_local_notifications: any
  flutter_secure_storage: any
  flutter_slidable: ^4.0.3
  flutter_staggered_grid_view: ^0.7.0
  get_it: ^9.2.1
  getwidget: ^7.0.0
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  haptic_feedback: ^0.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  infinite_scroll_pagination: ^4.0.0
  intl: ^0.20.2
  lottie: ^3.1.0
  package_info_plus: ^10.1.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  platform: ^3.1.4
  share_plus: any
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  timeago: ^3.6.1
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  wakelock_plus: ^1.2.3
  webview_flutter: ^4.9.0

dev_dependencies:
  bloc_test: ^9.1.7
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  mocktail: any

dependency_overrides:
  test_api: ^0.7.0
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash_icon.png"
  adaptive_icon_background: "assets/images/icon_background.png"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter_native_splash:
  color: "#0A0A0A"
  image: assets/images/splash_icon.png
  color_dark: "#0A0A0A"
  image_dark: assets/images/splash_icon.png
  android_12:
    image: assets/images/splash_icon.png
    icon_background_color: "#0A0A0A"
    image_dark: assets/images/splash_icon.png
    icon_background_color_dark: "#0A0A0A"
  ios: true
  android: true
  web: false
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
