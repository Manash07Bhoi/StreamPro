name: streampro
description: "StreamPro - Premium Free Video Streaming Experience"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^8.0.0
  cached_network_image: ^3.4.1
  flutter_inappwebview: ^6.1.0
  webview_flutter: ^4.9.0
  infinite_scroll_pagination: ^5.0.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.0
  dio: ^5.7.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  getwidget: ^4.0.0
  fluent_ui: ^4.13.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.0
  carousel_slider: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont.ttf
