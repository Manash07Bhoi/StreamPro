name: streampro
description: "StreamPro - Premium Free Video Streaming Experience"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^9.2.1
  cached_network_image: ^3.4.1
  flutter_inappwebview: ^6.1.0
  webview_flutter: ^4.9.0
  infinite_scroll_pagination: ^4.0.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^8.0.2
  connectivity_plus: ^7.1.1
  dio: ^5.7.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  getwidget: ^7.0.0
  fluent_ui: ^4.13.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1
  carousel_slider: ^5.0.0
  platform: ^3.1.4
  go_router: ^17.2.2
  uuid: ^4.5.3
  equatable: ^2.0.8
  intl: ^0.20.2
  flutter_slidable: ^4.0.3
  package_info_plus: ^10.1.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
